<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawlers - Brawl Stars Hub</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/brawlers.css">
</head>
<body>
    <nav class="main-nav">
        <a href="/" class="nav-logo">🏆 BrawlHub</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/brawlers.html" class="active">Brawlers</a>
            <a href="/player.html">Player Search</a>
            <a href="/rankings.html">Rankings</a>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>🏆 Brawl Stars Brawlers 🏆</h1>
            <p>Complete database of all 104 brawlers with verified stats</p>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name (e.g., 'el', 'spike', 'crow')..." class="search-input">
                <button id="searchBtn" class="btn btn-primary">🔍 Search</button>
                <button id="resetBtn" class="btn btn-secondary">Reset</button>
            </div>
            <div id="searchHint" class="search-hint"></div>
            
            <div class="filters">
                <select id="classFilter" class="filter-select">
                    <option value="">All Classes</option>
                    <option value="Assassin">Assassin</option>
                    <option value="Artillery">Artillery</option>
                    <option value="Controller">Controller</option>
                    <option value="Damage Dealer">Damage Dealer</option>
                    <option value="Marksman">Marksman</option>
                    <option value="Support">Support</option>
                    <option value="Tank">Tank</option>
                </select>
                
                <select id="rarityFilter" class="filter-select">
                    <option value="">All Rarities</option>
                    <option value="Starting Brawler">Starting Brawler</option>
                    <option value="Rare">Rare</option>
                    <option value="Super Rare">Super Rare</option>
                    <option value="Epic">Epic</option>
                    <option value="Mythic">Mythic</option>
                    <option value="Legendary">Legendary</option>
                    <option value="Ultra-Legendary">Ultra-Legendary</option>
                </select>
            </div>
        </div>

        <div class="stats-bar">
            <span id="brawlerCount">Loading...</span>
        </div>

        <div id="brawlersGrid" class="brawlers-grid">
            <div class="loading">Loading brawlers...</div>
        </div>

        <div class="pagination">
            <button id="prevBtn" class="btn btn-secondary" disabled>◀ Previous</button>
            <span id="pageInfo">Page 1</span>
            <button id="nextBtn" class="btn btn-secondary">Next ▶</button>
        </div>
    </div>

    <footer>
        <p>Data from Brawl Stars API | BrawlHub - Your Brawl Stars Companion</p>
    </footer>

    <script src="js/brawlers.js"></script>
</body>
</html>
